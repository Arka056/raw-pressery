<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raw Pressery | Alphonso Mango</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        @keyframes float-slow {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-15px) scale(1.02); }
            100% { transform: translateY(0px) scale(1); }
        }
        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 25px rgba(255, 165, 0, 0.4)); }
            50% { filter: drop-shadow(0 0 50px rgba(255, 165, 0, 0.8)); }
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f97316 0%, #ea580c 50%, #9a3412 100%);
            overflow-x: hidden;
            color: white;
            perspective: 1000px;
        }
        .bg-pattern {
            background-image: radial-gradient(circle at center, rgba(255,255,255,0.15) 0%, transparent 70%);
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .glass-nav {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .floating { animation: float 7s ease-in-out infinite; }
        .floating-delayed { animation: float 9s ease-in-out infinite; animation-delay: 2s; }
        .floating-bottle { animation: float-slow 6s ease-in-out infinite, pulse-glow 4s ease-in-out infinite; }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 2rem;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease-out;
            transform-style: preserve-3d;
        }
        .btn-glow {
            box-shadow: 0 10px 25px -5px rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
        }
        .btn-glow:hover {
            box-shadow: 0 20px 35px -5px rgba(255, 255, 255, 0.6);
            transform: translateY(-3px);
        }
    </style>
</head>
<body class="min-h-screen relative selection:bg-white selection:text-orange-600">
    <div class="bg-pattern fixed w-full h-full"></div>
    
    <nav class="glass-nav fixed w-full z-50 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center uppercase tracking-widest text-sm">
            <div class="font-bold text-2xl tracking-tighter cursor-pointer hover:scale-105 transition-transform">
                RAW<span class="font-light text-orange-200">PRESSERY</span>
            </div>
            <div class="space-x-10 hidden md:flex items-center">
                <a href="#" class="hover:text-orange-200 transition-colors duration-300 font-semibold pb-1 border-b-2 border-transparent hover:border-orange-200">Shop</a>
                <a href="#" class="hover:text-orange-200 transition-colors duration-300 font-semibold pb-1 border-b-2 border-transparent hover:border-orange-200">Our Story</a>
                <a href="#" class="bg-white text-orange-600 px-7 py-2.5 rounded-full font-bold hover:bg-orange-50 btn-glow">Cart (0)</a>
            </div>
        </div>
    </nav>

    <!-- Wrap main content to enable scrolling space for the sequence -->
    <div id="scrollContainer" class="relative z-10 bg-transparent w-full">
        <main class="relative min-h-[300vh] flex flex-col w-full">
            
            <!-- Decorative 3D Emojis -->
            <div class="fixed top-40 left-5 md:left-24 text-[5rem] md:text-[7rem] floating-delayed opacity-80 blur-[1px] drop-shadow-2xl z-0 pointer-events-none select-none">🥭</div>
            <div class="fixed bottom-24 right-5 md:right-24 text-[4rem] md:text-[5rem] floating opacity-70 blur-[1.5px] drop-shadow-xl z-0 pointer-events-none select-none">🍃</div>
            <div class="fixed top-1/3 right-10 md:right-32 text-[3rem] md:text-[4rem] floating opacity-50 blur-[2px] drop-shadow-xl z-0 hidden lg:block pointer-events-none select-none">🥭</div>

            <!-- Sticky Presentation Area -->
            <div class="sticky top-0 h-screen w-full flex flex-col items-center justify-center overflow-hidden">
                <!-- Massive Background Text -->
                <h1 class="text-[5rem] sm:text-[7rem] md:text-[10rem] font-black italic tracking-tighter text-white/10 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 whitespace-nowrap pointer-events-none select-none mix-blend-overlay origin-center">
                    ALPHONSO
                </h1>

                <!-- Bottle Sequence Animation Container -->
                <div class="relative z-20 group w-full h-full flex items-center justify-center">
                    <!-- The Sequence Loading Image -->
                    <img id="sequenceImage" src="./ezgif-3d771515e8c43ebd-jpg/ezgif-frame-001.jpg" alt="Mango Juice Bottle Sequence" 
                         class="w-[280px] sm:w-[450px] md:w-[600px] lg:w-[800px] xl:w-[950px] max-w-[90vw] max-h-[75vh] mx-auto object-contain relative z-10 transition-transform duration-100 ease-out mix-blend-multiply filter contrast-[1.1] saturate-[1.2]">
                    
                    <!-- Interactive Glow behind bottle -->
                    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[60%] h-[60%] bg-orange-300/40 blur-[120px] rounded-full z-0 pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>
                </div>
            </div>

            <!-- Content Appears at End of Scroll -->
            <div class="absolute bottom-10 left-1/2 -translate-x-1/2 w-full flex justify-center z-30 pointer-events-none">
                <!-- Glass Content Card -->
                <div class="glass-card p-6 md:p-10 z-30 max-w-2xl w-full mx-4 pointer-events-auto shadow-2xl">
                    <div class="uppercase tracking-[0.3em] text-orange-200 text-xs md:text-sm font-bold mb-3 drop-shadow-md">Premium Quality</div>
                    <h2 class="text-4xl md:text-6xl font-black uppercase tracking-tight text-white mb-4 drop-shadow-lg">Alphonso Mango</h2>
                    <p class="text-lg md:text-xl opacity-90 font-light mb-8 max-w-lg mx-auto leading-relaxed text-orange-50">Pure. Cold-Pressed. Golden. Experience the king of fruits in its most authentic, luscious form.</p>
                    
                    <div class="flex items-center justify-center gap-6 mb-10">
                        <span class="text-2xl font-light line-through opacity-60 text-orange-200">₹150</span>
                        <div class="flex flex-col items-center bg-white/20 px-8 py-3 rounded-2xl border border-white/40 backdrop-blur-md shadow-lg transform hover:scale-105 transition-transform cursor-default">
                            <span class="text-xs uppercase tracking-widest text-orange-100 font-bold mb-1">Today</span>
                            <span class="text-5xl font-black text-white drop-shadow-md">₹120</span>
                        </div>
                    </div>
                    
                    <button class="relative w-full sm:w-auto bg-white text-orange-700 px-14 py-4.5 rounded-full text-lg font-bold btn-glow overflow-hidden group">
                        <div class="absolute inset-0 w-0 bg-orange-100 transition-all duration-[250ms] ease-out group-hover:w-full opacity-50"></div>
                        <span class="relative z-10 flex items-center justify-center gap-3">
                            ADD TO BASKET
                            <svg class="w-6 h-6 group-hover:translate-x-1.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </span>
                    </button>
                    
                    <div class="mt-8 flex flex-wrap justify-center gap-x-6 gap-y-3 text-xs md:text-sm font-bold uppercase tracking-wider text-orange-50">
                        <span class="flex items-center gap-2 bg-black/10 px-3 py-1.5 rounded-full"><span class="w-2.5 h-2.5 rounded-full bg-green-400 animate-pulse"></span>No Added Sugar</span>
                        <span class="flex items-center gap-2 bg-black/10 px-3 py-1.5 rounded-full"><span class="w-2.5 h-2.5 rounded-full bg-green-400 animate-pulse"></span>Never from Concentrate</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Smooth 3D Glass Card Tilt Effect + Enhanced Parallax
        const card = document.querySelector('.glass-card');
        const bgText = document.querySelector('h1');
        const decorElements = document.querySelectorAll('.floating, .floating-delayed');
        let requestRef;

        let targetX = 0;
        let targetY = 0;
        let currentX = 0;
        let currentY = 0;

        document.addEventListener('mousemove', (e) => {
            // Normalized coordinates (-1 to 1)
            targetX = (e.clientX / window.innerWidth) * 2 - 1;
            targetY = (e.clientY / window.innerHeight) * 2 - 1;
        });

        // Smooth animation loop
        function animate() {
            // Lerp (Linear Interpolation) for smooth movement
            currentX += (targetX - currentX) * 0.1;
            currentY += (targetY - currentY) * 0.1;

            // 1. Tilt the glass card
            if (card) {
                // Limit the tilt angle using normalized coords
                const tiltX = currentY * -10; // degrees
                const tiltY = currentX * 10;
                card.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
            }

            // 2. Parallax background text + SCROLL SCALING
            if (bgText) {
                const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
                let scrollProgress = maxScroll > 0 ? window.scrollY / maxScroll : 0;
                if (scrollProgress < 0) scrollProgress = 0;
                if (scrollProgress > 1) scrollProgress = 1;
                
                // Scale text down smoothly to 40% of its original size as we scroll
                const scale = Math.max(0.4, 1 - (scrollProgress * 0.6));
                
                bgText.style.transform = `translate(calc(-50% + ${currentX * -30}px), calc(-50% + ${currentY * -30}px)) scale(${scale})`;
            }

            // 3. Parallax decorative images
            decorElements.forEach(el => {
                const speedMultipler = el.classList.contains('floating-delayed') ? 20 : 35;
                el.style.transform = `translate(${currentX * speedMultipler}px, ${currentY * speedMultipler}px)`;
            });

            requestRef = requestAnimationFrame(animate);
        }

        // Start animation loop
        requestAnimationFrame(animate);

        // Reset positions on mouse leave
        document.body.addEventListener('mouseleave', () => {
             targetX = 0;
             targetY = 0;
        });

        // 4. Scroll-based Image Sequence Animation
        const sequenceImage = document.getElementById('sequenceImage');
        const totalFrames = 200;
        
        // Preload frames for smooth playback
        const preloadedImages = [];
        for (let i = 1; i <= totalFrames; i++) {
            const img = new Image();
            // Format number to be 3 digits (e.g., 001, 045, 200)
            const frameNum = i.toString().padStart(3, '0');
            img.src = `./ezgif-3d771515e8c43ebd-jpg/ezgif-frame-${frameNum}.jpg`;
            preloadedImages.push(img);
        }

        window.addEventListener('scroll', () => {
            // Calculate how far down the user has scrolled as a percentage of the total scrollable height
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            let scrollFraction = window.scrollY / maxScroll;
            
            // Limit between 0 and 1
            if (scrollFraction < 0) scrollFraction = 0;
            if (scrollFraction > 1) scrollFraction = 1;

            // Map fraction to the correct frame index
            const frameIndex = Math.min(
                totalFrames - 1,
                Math.floor(scrollFraction * totalFrames)
            );
            
            // Set the new source
            if (sequenceImage && preloadedImages[frameIndex]) {
                sequenceImage.src = preloadedImages[frameIndex].src;
            }
        });
    </script>
</body>
</html>
